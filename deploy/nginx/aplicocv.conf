# AplicoCV — host Nginx reverse proxy.
# Install to /etc/nginx/sites-available/aplicocv.conf and symlink into
# sites-enabled. TLS certs are issued by Certbot (Let's Encrypt):
#   sudo certbot --nginx -d aplicocv.com -d www.aplicocv.com -d api.aplicocv.com
# Certbot auto-renews via its systemd timer.

# ---- Security headers applied to all responses -----------------------------
map $sent_http_content_type $aplicocv_csp {
    default "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://api.aplicocv.com https://*.sentry.io; frame-ancestors 'none'; base-uri 'self'";
}

# ---- HTTP -> HTTPS redirect for every host ---------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name aplicocv.com www.aplicocv.com api.aplicocv.com;

    # Allow ACME http-01 challenges before redirecting.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- Web app (SPA static files) --------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aplicocv.com www.aplicocv.com;

    ssl_certificate /etc/letsencrypt/live/aplicocv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aplicocv.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $aplicocv_csp always;

    root /var/www/aplicocv;
    index index.html;

    client_max_body_size 15m;

    # Same-origin API proxy. The SPA calls /api and relies on the HttpOnly
    # refresh cookie being first-party, so the API is served from this origin
    # (the extension also targets https://aplicocv.com/api). The api.aplicocv.com
    # block below is an optional direct endpoint.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Hashed assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ---- API (proxies to the FastAPI container on 127.0.0.1:8000) --------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aplicocv.com;

    ssl_certificate /etc/letsencrypt/live/api.aplicocv.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aplicocv.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;

    # CV uploads can be a few MB.
    client_max_body_size 15m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events (CV parse stream) must not be buffered.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
